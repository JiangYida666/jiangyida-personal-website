name: Deploy Quarto Website

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # 强制使用 Node.js 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        
      - name: Setup Quarto
        run: |
          wget -q https://github.com/quarto-dev/quarto-cli/releases/download/v1.5.36/quarto-1.5.36-linux-amd64.deb
          sudo dpkg -i quarto-1.5.36-linux-amd64.deb
          quarto check
        
      - name: Install Python dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip3 install matplotlib numpy pandas
        
      - name: Build with Quarto
        run: quarto render
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true