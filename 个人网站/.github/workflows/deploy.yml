name: Deploy Quarto Website to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        
      - name: Install Quarto
        run: |
          wget -q https://github.com/quarto-dev/quarto-cli/releases/download/v1.6.39/quarto-1.6.39-linux-amd64.tar.gz
          tar -xzf quarto-1.6.39-linux-amd64.tar.gz
          echo "$(pwd)/quarto-1.6.39/bin" >> $GITHUB_PATH
          
      - name: Verify Quarto
        run: quarto --version
        
      - name: Render Quarto Site
        run: |
          echo "Rendering site..."
          quarto render
          echo "Render complete!"
          ls -la docs/
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
